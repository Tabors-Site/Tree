<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    font-size: 13px;
    color: #e0e0e0;
    background: #1a1a2e;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .header {
    padding: 12px 16px;
    border-bottom: 1px solid #ffffff10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .header h1 { font-size: 14px; font-weight: 600; color: #fff; }

  .status-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .status-dot.disconnected { background: #666; }
  .status-dot.connecting { background: #f0a030; animation: pulse 1s infinite; }
  .status-dot.connected { background: #40c060; }

  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

  .toolbar {
    padding: 8px 16px;
    border-bottom: 1px solid #ffffff10;
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }

  .toolbar button {
    padding: 5px 10px;
    border: 1px solid #ffffff15;
    border-radius: 5px;
    background: none;
    color: #aaa;
    font-size: 12px;
    cursor: pointer;
  }
  .toolbar button:hover { background: #ffffff08; color: #ddd; }
  .toolbar button.active { background: #4a6fa520; color: #7a9fd5; border-color: #4a6fa540; }

  .log {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
  }

  .log-entry {
    padding: 8px 10px;
    margin-bottom: 6px;
    border-radius: 6px;
    background: #0f0f1a;
    border-left: 3px solid #333;
    font-size: 12px;
    line-height: 1.5;
  }
  .log-entry.action { border-left-color: #4a6fa5; }
  .log-entry.state { border-left-color: #40c060; }
  .log-entry.error { border-left-color: #c04040; }
  .log-entry.confirm { border-left-color: #f0a030; }

  .log-time {
    font-size: 10px;
    color: #666;
    margin-bottom: 2px;
  }

  .log-content { color: #ccc; }
  .log-content code {
    background: #ffffff10;
    padding: 1px 4px;
    border-radius: 3px;
    font-size: 11px;
  }

  .confirm-inline {
    margin-top: 6px;
    display: flex;
    gap: 6px;
  }
  .confirm-inline button {
    padding: 3px 10px;
    border: none;
    border-radius: 4px;
    font-size: 11px;
    cursor: pointer;
  }
  .confirm-inline .allow { background: #4a6fa5; color: #fff; }
  .confirm-inline .deny { background: #5a2020; color: #e88; }

  .tree-view {
    flex: 1;
    overflow: auto;
    padding: 12px 16px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 11px;
    line-height: 1.6;
    display: none;
  }

  .tree-node { padding-left: 16px; }
  .tree-node.interactive { color: #7ac; }
  .tree-node .role { color: #c97; }
  .tree-node .name { color: #9b9; }
  .tree-node .id { color: #666; font-size: 10px; }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 200px;
    color: #555;
    text-align: center;
    gap: 8px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="status-dot disconnected" id="statusDot"></div>
    <h1>TreeOS Bridge</h1>
  </div>
</div>

<div class="toolbar">
  <button id="tabLog" class="active">Activity</button>
  <button id="tabTree">Page Tree</button>
  <button id="sendState">Send State</button>
  <button id="sendScreenshot">Screenshot</button>
</div>

<div class="log" id="logView">
  <div class="empty-state">
    <div>No activity yet</div>
    <div style="font-size:11px">Connect to your TreeOS land to start</div>
  </div>
</div>

<div class="tree-view" id="treeView"></div>

<div style="padding:8px 16px;border-top:1px solid #ffffff10;flex-shrink:0;">
  <button id="clearLog" style="width:100%;padding:6px;font-size:11px;background:none;border:1px solid #ffffff15;color:#666;border-radius:6px;cursor:pointer;">Clear Activity</button>
</div>

<script src="sidepanel.js"></script>
</body>
</html>
