<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 340px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    font-size: 13px;
    color: #e0e0e0;
    background: #1a1a2e;
  }

  .header {
    padding: 16px;
    border-bottom: 1px solid #ffffff10;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .header h1 {
    font-size: 14px;
    font-weight: 600;
    color: #fff;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .status-dot.disconnected { background: #666; }
  .status-dot.connecting { background: #f0a030; animation: pulse 1s infinite; }
  .status-dot.connected { background: #40c060; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .section {
    padding: 16px;
    border-bottom: 1px solid #ffffff10;
  }

  label {
    display: block;
    font-size: 11px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }

  input[type="text"], input[type="password"] {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid #ffffff15;
    border-radius: 6px;
    background: #0f0f1a;
    color: #fff;
    font-size: 13px;
    outline: none;
    margin-bottom: 12px;
  }
  input:focus { border-color: #4a6fa5; }

  .toggle-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .toggle-label {
    font-size: 13px;
    color: #ccc;
  }

  .toggle {
    position: relative;
    width: 36px;
    height: 20px;
    cursor: pointer;
  }

  .toggle input { display: none; }

  .toggle .slider {
    position: absolute;
    inset: 0;
    background: #333;
    border-radius: 10px;
    transition: background 0.2s;
  }
  .toggle .slider::after {
    content: '';
    position: absolute;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #fff;
    top: 2px;
    left: 2px;
    transition: transform 0.2s;
  }
  .toggle input:checked + .slider { background: #4a6fa5; }
  .toggle input:checked + .slider::after { transform: translateX(16px); }

  .buttons {
    padding: 16px;
    display: flex;
    gap: 8px;
  }

  button {
    flex: 1;
    padding: 8px 12px;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }

  .btn-primary {
    background: #4a6fa5;
    color: #fff;
  }
  .btn-primary:hover { background: #5a7fb5; }
  .btn-primary:disabled { background: #333; color: #666; cursor: default; }

  .btn-secondary {
    background: #2a2a3e;
    color: #ccc;
  }
  .btn-secondary:hover { background: #3a3a4e; }

  .btn-danger {
    background: #5a2020;
    color: #e88;
  }
  .btn-danger:hover { background: #6a3030; }

  .status-bar {
    padding: 10px 16px;
    font-size: 11px;
    color: #888;
    text-align: center;
    background: #12121e;
  }

  .actions {
    padding: 12px 16px;
    display: flex;
    gap: 8px;
  }

  .actions button {
    font-size: 12px;
    padding: 6px 10px;
  }

  #confirmations {
    max-height: 200px;
    overflow-y: auto;
  }

  .confirm-card {
    padding: 12px 16px;
    background: #2a2a3e;
    margin: 8px 16px;
    border-radius: 8px;
    border-left: 3px solid #f0a030;
  }

  .confirm-card p {
    margin-bottom: 8px;
    color: #ddd;
  }

  .confirm-buttons {
    display: flex;
    gap: 6px;
  }
  .confirm-buttons button {
    padding: 4px 12px;
    font-size: 12px;
  }

  .open-panel {
    padding: 0 16px 12px;
  }
  .open-panel button {
    width: 100%;
    padding: 6px;
    font-size: 12px;
    background: none;
    border: 1px solid #ffffff15;
    color: #888;
    border-radius: 6px;
    cursor: pointer;
  }
  .open-panel button:hover { color: #ccc; border-color: #ffffff30; }
</style>
</head>
<body>

<div class="header">
  <div class="status-dot disconnected" id="statusDot"></div>
  <h1>TreeOS Browser Bridge</h1>
</div>

<div class="section">
  <label>Server URL</label>
  <input type="text" id="serverUrl" placeholder="https://your-land.treeos.ai">

  <label>API Key (or leave blank and use login below)</label>
  <input type="password" id="apiKey" placeholder="Your TreeOS API key">

  <label>Or login with username</label>
  <input type="text" id="username" placeholder="Username">
  <input type="password" id="loginPassword" placeholder="Password">

  <div class="toggle-row">
    <span class="toggle-label">Confirm actions</span>
    <label class="toggle">
      <input type="checkbox" id="confirmActions" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="toggle-row">
    <span class="toggle-label">Auto-send state after actions</span>
    <label class="toggle">
      <input type="checkbox" id="autoCapture">
      <span class="slider"></span>
    </label>
  </div>
</div>

<div class="buttons">
  <button class="btn-primary" id="connectBtn">Connect</button>
  <button class="btn-danger" id="disconnectBtn" style="display:none">Disconnect</button>
  <button class="btn-secondary" id="saveBtn">Save</button>
</div>

<div class="actions" id="connectedActions" style="display:none">
  <button class="btn-secondary" id="captureBtn">Send Page State</button>
  <button class="btn-secondary" id="screenshotBtn">Send Screenshot</button>
</div>

<div id="confirmations"></div>

<div class="open-panel">
  <button id="openPanelBtn">Open Side Panel</button>
</div>

<div class="status-bar" id="statusBar">Not connected</div>

<script src="popup.js"></script>
</body>
</html>
